# TLS-enabled nginx config for production deployment.
# Mount cert.pem and key.pem into /etc/nginx/ssl/ via docker volume.
#
# Usage in docker-compose:
#   volumes:
#     - ./certs/cert.pem:/etc/nginx/ssl/cert.pem
#     - ./certs/key.pem:/etc/nginx/ssl/key.pem
#   ports:
#     - "443:443"

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "0" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location /remote_claude/api/ {
        rewrite ^/remote_claude/api/(.*) /api/$1 break;
        proxy_pass http://remote-claude-relay-server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /remote_claude/ws {
        rewrite ^/remote_claude/ws/(.*) /remote_claude/$1 break;
        proxy_pass http://remote-claude-relay-server:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /remote_claude/assets {
        root   /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /remote_claude {
        root   /usr/share/nginx/html;
        index  index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
