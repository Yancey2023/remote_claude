name: remote-claude

services:
  relay-server:
    container_name: remote-claude-relay-server
    build: .
    ports:
      - "8080:8080"
    volumes:
      - relay-config:/app/config
      - relay-data:/app/data
      - relay-downloads:/app/downloads
    environment:
      - ADMIN_USER=${RELAY_ADMIN_USER:-admin}
      - ADMIN_PASS=${RELAY_ADMIN_PASS:-admin123}
      - JWT_SECRET=${RELAY_JWT_SECRET:-change-me}
    restart: unless-stopped

volumes:
  relay-config:
  relay-data:
  relay-downloads:
