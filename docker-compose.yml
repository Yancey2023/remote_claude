name: remote-claude

services:
  relay-server:
    container_name: remote-claude-relay-server
    image: ghcr.io/yancey2023/remote_claude-relay-server:main
    ports:
      - "8080:8080"
    volumes:
      - relay-config:/app/config
      - relay-data:/app/data
    environment:
      - ADMIN_USER=${RELAY_ADMIN_USER:-admin}
      - ADMIN_PASS=${RELAY_ADMIN_PASS:-admin123}
      - JWT_SECRET=${RELAY_JWT_SECRET:-change-me}
    restart: unless-stopped

  web-ui:
    container_name: remote-claude-web-ui
    build:
      context: .
      dockerfile: web-ui/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - relay-server
    restart: unless-stopped

volumes:
  relay-config:
  relay-data:
