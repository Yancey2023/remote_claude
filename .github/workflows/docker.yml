name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  relay-server:
    name: relay-server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/remote-claude
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=relay-server
          cache-to: type=gha,mode=max,scope=relay-server

      - name: Save image for transfer
        run: |
          IMAGE="${{ secrets.DOCKER_USERNAME }}/remote-claude:${{ github.sha }}"
          docker tag "$IMAGE" "${{ secrets.DOCKER_USERNAME }}/remote-claude:latest"
          docker save "${{ secrets.DOCKER_USERNAME }}/remote-claude:latest" | gzip > /tmp/remote-claude.tar.gz

      - name: Copy image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.ACCESS_TOKEN }}
          source: /tmp/remote-claude.tar.gz
          target: /tmp/

      - name: Load and restart on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.ACCESS_TOKEN }}
          script: |
            sudo docker load -i /tmp/remote-claude.tar.gz
            rm -f /tmp/remote-claude.tar.gz
            cd /home/ubuntu/server
            sudo docker compose up -d --no-deps remote-claude
