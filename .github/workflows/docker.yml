name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  desktop-client:
    name: client-${{ matrix.name }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux-x64
          - os: ubuntu-22.04-arm
            name: linux-arm64
          - os: windows-latest
            name: windows-x64
          - os: windows-11-arm
            name: windows-arm64
          - os: macos-13
            name: darwin-x64
          - os: macos-14
            name: darwin-arm64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop-client
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop-client/target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-client-${{ hashFiles('desktop-client/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: desktop-client/target/release/desktop-client${{ runner.os == 'Windows' && '.exe' || '' }}

  relay-server:
    runs-on: ubuntu-latest
    needs: [desktop-client]
    steps:
      - uses: actions/checkout@v4

      - name: Download client binaries
        uses: actions/download-artifact@v4
        with:
          path: downloads

      - name: Rename binaries to release naming
        run: |
          version=$(grep '^version' desktop-client/Cargo.toml | head -1 | cut -d'"' -f2)
          mv downloads/linux-x64/desktop-client "downloads/remote-claude-desktop-client-v${version}-linux-x64"
          mv downloads/linux-arm64/desktop-client "downloads/remote-claude-desktop-client-v${version}-linux-arm64"
          mv downloads/windows-x64/desktop-client.exe "downloads/remote-claude-desktop-client-v${version}-windows-x64.exe"
          mv downloads/windows-arm64/desktop-client.exe "downloads/remote-claude-desktop-client-v${version}-windows-arm64.exe"
          mv downloads/darwin-x64/desktop-client "downloads/remote-claude-desktop-client-v${version}-darwin-x64"
          mv downloads/darwin-arm64/desktop-client "downloads/remote-claude-desktop-client-v${version}-darwin-arm64"
          chmod +x downloads/*
          rm -rf downloads/linux-x64 downloads/linux-arm64 downloads/windows-x64 downloads/windows-arm64 downloads/darwin-x64 downloads/darwin-arm64
          ls -la downloads/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/remote-claude
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=relay-server
          cache-to: type=gha,mode=max,scope=relay-server

      - name: Save image for transfer
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          IMAGE="${{ secrets.DOCKER_USERNAME }}/remote-claude:${SHORT_SHA}"
          docker tag "$IMAGE" "${{ secrets.DOCKER_USERNAME }}/remote-claude:latest"
          docker save "${{ secrets.DOCKER_USERNAME }}/remote-claude:latest" | gzip > remote-claude.tar.gz

      - name: Copy image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.ACCESS_TOKEN }}
          source: remote-claude.tar.gz
          target: /tmp/

      - name: Load and restart on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.ACCESS_TOKEN }}
          script: |
            sudo docker load -i /tmp/remote-claude.tar.gz
            rm -f /tmp/remote-claude.tar.gz
            cd /home/ubuntu/server
            sudo docker compose up -d --no-deps remote-claude
