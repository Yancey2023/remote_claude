name: deploy

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'apps/client/Cargo.toml'
      - 'package/shared-types/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: |
          VERSION=$(grep '^version' apps/client/Cargo.toml | head -1 | cut -d'"' -f2)
          export VITE_CLIENT_VERSION="$VERSION"
          pnpm build
        env:
          VITE_BASE_URL: /remote_claude

      - name: Deploy
        uses: easingthemes/ssh-deploy@v5.1.1
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ACCESS_TOKEN }}
          ARGS: "-avz --delete"
          SOURCE: "apps/web/dist/"
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          TARGET: ${{ secrets.TARGET }}
