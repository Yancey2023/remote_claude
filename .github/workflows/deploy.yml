name: deploy

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'package/shared-types/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Extract version
        run: echo "VITE_CLIENT_VERSION=$(grep '^version' apps/client/Cargo.toml | head -1 | cut -d'\"' -f2)" >> $GITHUB_ENV

      - name: Build
        run: pnpm build
        env:
          VITE_BASE_URL: /remote_claude
          VITE_CLIENT_VERSION: ${{ env.VITE_CLIENT_VERSION }}

      - name: Deploy
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ACCESS_TOKEN }}
          ARGS: "-avz --delete"
          SOURCE: "apps/web/dist/"
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          TARGET: ${{ secrets.TARGET }}
