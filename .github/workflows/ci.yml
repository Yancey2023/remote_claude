name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      remote-claude-server: ${{ steps.filter.outputs.remote-claude-server }}
      remote-claude-client: ${{ steps.filter.outputs.remote-claude-client }}
      web-ui: ${{ steps.filter.outputs.web-ui }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            remote-claude-server:
              - 'apps/server/**'
              - 'package/shared-types/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'
            remote-claude-client:
              - 'apps/client/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'
            web-ui:
              - 'apps/web/**'
              - 'package/shared-types/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/ci.yml'

  remote-claude-server:
    name: remote-claude-server
    needs: [changes]
    if: ${{ needs.changes.outputs.remote-claude-server == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/server/target
          key: ${{ runner.os }}-cargo-relay-musl-${{ hashFiles('Cargo.lock') }}

      - name: Install musl target
        run: |
          rustup target add x86_64-unknown-linux-musl
          sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-musl -p remote-claude-server

      - name: Run tests
        run: cargo test --target x86_64-unknown-linux-musl -p remote-claude-server

  remote-claude-client:
    name: remote-claude-client
    needs: [changes]
    if: ${{ needs.changes.outputs.remote-claude-client == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v4

      - name: Install musl target
        run: |
          rustup target add x86_64-unknown-linux-musl
          sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/client/target
          key: ${{ runner.os }}-cargo-client-musl-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-musl -p remote-claude-client

      - name: Run tests
        run: cargo test --target x86_64-unknown-linux-musl -p remote-claude-client

  web-ui:
    name: web-ui
    needs: [changes]
    if: ${{ needs.changes.outputs.web-ui == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: latest
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test
