name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      relay-server: ${{ steps.filter.outputs.relay-server }}
      desktop-client: ${{ steps.filter.outputs.desktop-client }}
      web-ui: ${{ steps.filter.outputs.web-ui }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            relay-server:
              - 'relay-server/**'
              - 'shared-types/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'
            desktop-client:
              - 'desktop-client/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'
            web-ui:
              - 'web-ui/**'
              - 'shared-types/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/ci.yml'

  relay-server:
    name: relay-server
    needs: [changes]
    if: ${{ needs.changes.outputs.relay-server == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: relay-server
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            relay-server/target
          key: ${{ runner.os }}-cargo-relay-${{ hashFiles('relay-server/Cargo.lock') }}

      - name: Build
        run: cargo build --release --workspace

      - name: Run tests
        run: cargo test --workspace

  desktop-client:
    name: desktop-client
    needs: [changes]
    if: ${{ needs.changes.outputs.desktop-client == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop-client
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop-client/target
          key: ${{ runner.os }}-cargo-client-${{ hashFiles('desktop-client/Cargo.lock') }}

      - name: Build
        run: cargo build --release --workspace

      - name: Run tests
        run: cargo test --workspace

  web-ui:
    name: web-ui
    needs: [changes]
    if: ${{ needs.changes.outputs.web-ui == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: latest
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter @remote-claude/web-ui exec tsc --noEmit

      - name: Build
        run: pnpm --filter @remote-claude/web-ui build

      - name: Run tests
        run: pnpm --filter @remote-claude/web-ui test
