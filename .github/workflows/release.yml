name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  relay-server:
    name: relay-server (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            short_target: linux-x64
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            short_target: windows-x64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: relay-server
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            relay-server/target
          key: ${{ runner.os }}-cargo-relay-${{ hashFiles('relay-server/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          artifact="remote-claude-relay-server-${{ github.ref_name }}-${{ matrix.short_target }}${{ matrix.ext }}"
          cp "target/${{ matrix.target }}/release/relay-server${{ matrix.ext }}" "$artifact"

      - uses: actions/upload-artifact@v4
        with:
          name: relay-server-${{ matrix.short_target }}
          path: relay-server/remote-claude-relay-server-*

  desktop-client:
    name: desktop-client (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            short_target: linux-x64
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            short_target: windows-x64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop-client
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop-client/target
          key: ${{ runner.os }}-cargo-client-${{ hashFiles('desktop-client/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          artifact="remote-claude-desktop-client-${{ github.ref_name }}-${{ matrix.short_target }}${{ matrix.ext }}"
          cp "target/${{ matrix.target }}/release/desktop-client${{ matrix.ext }}" "$artifact"

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-client-${{ matrix.short_target }}
          path: desktop-client/remote-claude-desktop-client-*

  web-ui:
    name: web-ui
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: latest
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @remote-claude/web-ui build
        env:
          VITE_BASE_URL: /remote_claude

      - name: Package
        shell: bash
        run: |
          cd dist
          zip -r "../remote-claude-web-ui-${{ github.ref_name }}.zip" .

      - uses: actions/upload-artifact@v4
        with:
          name: web-ui-dist
          path: web-ui/remote-claude-web-ui-*

  release:
    name: Create Release
    needs: [relay-server, desktop-client, web-ui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Install git-cliff
        run: pipx install git-cliff

      - name: Generate changelog
        run: |
          git cliff -o CHANGELOG.md
          git cliff --current -o release-notes.md

      - name: Commit CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "docs: update CHANGELOG.md [skip ci]"
          git push

      - uses: actions/download-artifact@v4

      - name: Display structure
        shell: bash
        run: ls -R

      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            relay-server-linux-x64/*
            relay-server-windows-x64/*
            desktop-client-linux-x64/*
            desktop-client-windows-x64/*
            web-ui-dist/*
